<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <h1>Excel Reader</h1>
  <div id="output">Loading...</div>
  <script>
    fetch('DSCuaHangFinal.xlsx')
      .then(response => response.arrayBuffer())
      .then(data => {
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        
        let html = "<h2>Search Results for ID 6871</h2><ul>";
        let count = 0;
        json.forEach((row, index) => {
          const rowStr = JSON.stringify(row);
          // Check for 6871 in any field
          for (let key in row) {
            if (String(row[key]) === "6871" || String(row[key]).includes("6871") || rowStr.toLowerCase().includes("hưng hóa") || rowStr.toLowerCase().includes("hồ thiên hương")) {
              html += `<li>Row ${index + 2}: ${rowStr}</li>`;
              count++;
              break;
            }
          }
        });
        if (count === 0) {
          html += "<li>No matches found</li>";
        }
        html += "</ul>";
        document.getElementById('output').innerHTML = html;
      })
      .catch(err => {
        document.getElementById('output').innerHTML = "Error: " + err;
      });
  </script>
</body>
</html>
